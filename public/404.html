<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Halaman Tidak Ditemukan | Ledgerly</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <!-- pre-paint tema biar konsisten sama halaman lain (anti-FOUC) -->
  <script>(function(){try{if(localStorage.getItem('ledgerly_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  <!-- semua style di-inline biar 404 tetep tampil rapi walau aset lain gagal -->
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --indigo: #4f46e5; --indigo-2: #9333ea;
    }
    html[data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
      --border: rgba(148,163,184,0.18); --indigo: #818cf8; --indigo-2: #c084fc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .wrap { max-width: 460px; width: 100%; }
    .brand {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 32px;
    }
    .brand-logo {
      width: 36px; height: 36px; border-radius: 12px;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      display: grid; place-items: center;
    }
    .brand-logo img { width: 100%; height: 100%; filter: brightness(0) invert(1); }
    .brand-name { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .illus { width: 100%; max-width: 320px; height: auto; margin: 0 auto 8px; display: block; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.01em; }
    p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: 12px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: transform 0.15s ease, opacity 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary { background: linear-gradient(135deg, #4f46e5, #9333ea); color: #fff; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    @media (max-width: 480px) { h1 { font-size: 19px; } .illus { max-width: 240px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="brand-logo"><img src="/assets/logo.svg" alt="Logo Ledgerly"></div>
      <span class="brand-name">Ledgerly</span>
    </div>

    <!-- ilustrasi 404 (SVG inline, gak ada media eksternal) -->
    <svg class="illus" viewBox="0 0 400 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ilustrasi 404">
      <defs>
        <linearGradient id="g404" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="var(--indigo)"/>
          <stop offset="100%" stop-color="var(--indigo-2)"/>
        </linearGradient>
      </defs>
      <text x="200" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="140" font-weight="800" fill="url(#g404)" letter-spacing="-4">404</text>
      <circle cx="200" cy="78" r="20" fill="none" stroke="url(#g404)" stroke-width="6"/>
      <line x1="214" y1="92" x2="232" y2="110" stroke="url(#g404)" stroke-width="6" stroke-linecap="round"/>
      <circle cx="200" cy="78" r="7" fill="url(#g404)" opacity="0.5"/>
    </svg>

    <h1>Halaman Tidak Ditemukan</h1>
    <p>Maaf, halaman yang Anda cari tidak ada atau sudah dipindahkan. Cek kembali alamatnya, atau kembali ke beranda.</p>

    <div class="actions">
      <a href="/" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Kembali ke Beranda
      </a>
      <a href="/login" class="btn btn-secondary">Masuk ke Dashboard</a>
    </div>
  </div>
</body>
</html>
