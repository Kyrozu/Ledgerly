<div class="page-header">
  <h1 class="page-title">Export Laporan</h1>
  <p class="page-desc">Unduh data inventaris dan keuangan dalam berbagai format</p>
</div>

<!-- Filter periode laporan -->
<div class="card p-20">
  <div class="custom-card">
    <div>
      <div class="card-title">Rentang Periode Laporan</div>
      <div class="card-subtitle">Pilih tanggal untuk filter CSV, Excel, dan PDF</div>
    </div>
    <div class="form-group margin-left">
      <div id="drp-laporan" style="min-width: 240px"></div>
      <button class="btn btn-secondary" onclick="resetPeriodeLaporan()">Reset</button>
    </div>
  </div>
</div>

<div class="stats-row" id="lap-stats-row"></div>

<div class="export-grid" id="lap-export-grid"></div>

<!-- Status Cloud Sync -->
<div class="card p-20">
  <div class="custom-card">
    <div class="custom-card-left">
      <div class="stat-icon green-icon" id="lap-cloud-icon"></div>
      <div>
        <div class="card-title">Cloud Sync</div>
        <div class="card-subtitle">Data tersinkronisasi dgn Supabase</div>
      </div>
    </div>
    <div class="sync-status"><span class="sync-dot"></span> Terhubung</div>
  </div>
</div>
