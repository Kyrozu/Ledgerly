<div class="page-header">
  <h1 class="page-title">Export Laporan</h1>
  <p class="page-desc">Unduh data inventaris dan keuangan dalam berbagai format</p>
</div>

<!-- Filter periode laporan -->
<div class="card" style="margin-bottom:24px; padding:20px;">
  <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
    <div style="flex-shrink:0;">
      <div style="font-size:14px; font-weight:600; color:var(--slate-900); margin-bottom:4px;">Rentang Periode Laporan</div>
      <div style="font-size:12px; color:var(--slate-500);">Pilih tanggal untuk filter CSV, Excel, dan PDF</div>
    </div>
    <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-left:auto;">
      <input class="form-input" type="date" id="filter-lap-start" style="font-size:12px; padding:6px 10px; max-width:150px;">
      <span style="color:var(--slate-400); font-size:12px;">s/d</span>
      <input class="form-input" type="date" id="filter-lap-end" style="font-size:12px; padding:6px 10px; max-width:150px;">
      <button class="btn btn-secondary" style="padding:6px 12px; font-size:12px;" onclick="resetPeriodeLaporan()">Reset</button>
    </div>
  </div>
</div>

<div class="stats-row" id="lap-stats-row"></div>

<div class="export-grid" id="lap-export-grid"></div>

<div class="card" style="margin-top:24px; padding:20px;">
  <div style="display:flex; align-items:center; justify-content:space-between;">
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="stat-icon" style="background:var(--emerald-50); color:var(--emerald-600);" id="lap-cloud-icon"></div>
      <div>
        <div style="font-size:14px; font-weight:600; color:var(--slate-900);">Cloud Sync</div>
        <div style="font-size:12px; color:var(--slate-500);">Data tersinkronisasi dgn Supabase</div>
      </div>
    </div>
    <div class="sync-status"><span class="sync-dot"></span> Terhubung</div>
  </div>
</div>
