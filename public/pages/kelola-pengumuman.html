<div class="page-header flex-between">
  <div>
    <h1 class="page-title">Kelola Pengumuman</h1>
    <p class="page-desc">Kirim pengumuman ke semua pemilik toko & atur saluran WhatsApp</p>
  </div>
  <button class="btn btn-primary" onclick="bukaModalPengumuman()"><span id="kp-plus-icon"></span> Pengumuman Baru</button>
</div>

<!-- atur link saluran whatsapp -->
<div class="card p-20">
  <div class="card-title">Link Saluran WhatsApp</div>
  <div class="card-subtitle mb-16">
    Tempel link saluran WhatsApp (channel) di sini. Jika dikosongkan, di halaman pemilik akan tampil status "belum tersedia".
  </div>
  <div class="form-group">
    <input class="form-input" type="text" id="kp-wa-saluran" placeholder="https://whatsapp.com/channel/..." />
    <button class="btn btn-primary" onclick="simpanSaluranWA()" id="kp-btn-saluran">Simpan Link</button>
  </div>
  <div id="kp-saluran-status" class="kp-saluran-status"></div>
</div>

<!-- daftar pengumuman -->
<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">Daftar Pengumuman</div>
      <div class="card-subtitle" id="kp-subtitle">Memuat...</div>
    </div>
  </div>
  <div style="overflow-x: auto">
    <table class="tabel" id="tabel-pengumuman">
      <thead>
        <tr>
          <th>Judul</th>
          <th>Isi</th>
          <th>Tanggal</th>
          <th class="text-center" style="width: 80px">Status</th>
          <th class="text-center" style="width: 160px">Aksi</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="5" class="text-center td-mono p-40">Memuat data...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
