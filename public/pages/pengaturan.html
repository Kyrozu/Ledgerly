<div class="page-header">
  <h1 class="page-title">Pengaturan</h1>
  <p class="page-desc">Konfigurasi workspace dan integrasi</p>
</div>

<!-- Informasi Workspace & Paket (Gabungan) -->
<div class="card" id="set-akun-card" style="margin-bottom:24px;">
  <div class="card-header">
    <div>
      <div class="card-title">Informasi Workspace & Paket</div>
      <div class="card-subtitle">Detail profil, bisnis, lisensi akun, dan kontak bantuan</div>
    </div>
  </div>
  
  <!-- Info Workspace Grid -->
  <div style="padding:20px; display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div>
      <div class="setting-label"><span id="set-user-icon"></span> Nama</div>
      <div class="setting-field" id="set-user-name">-</div>
    </div>
    <div>
      <div class="setting-label">Email</div>
      <div class="setting-field" style="text-transform:none;" id="set-user-email">-</div>
    </div>
    <div>
      <div class="setting-label">Nama Bisnis</div>
      <div class="setting-field" id="set-user-bisnis">-</div>
    </div>
    <div>
      <div class="setting-label">Peran</div>
      <div class="setting-field" id="set-user-role">-</div>
    </div>
  </div>
  
  <!-- Info Paket Container -->
  <div id="set-paket-container" style="padding: 0 20px 20px 20px; border-top: 1px solid var(--slate-100); padding-top: 20px;"></div>
</div>

<!-- Pengaturan Keuangan -->
<div class="card" id="set-keuangan-card" style="margin-bottom:24px;">
  <div class="card-header">
    <div>
      <div class="card-title">Pengaturan Keuangan</div>
      <div class="card-subtitle">Konfigurasi perhitungan laporan keuangan</div>
    </div>
  </div>
  <div id="set-keuangan-container" style="padding:20px;"></div>
</div>

<!-- Integrasi (Hanya untuk Paket Profesional/Enterprise) -->
<div class="card" id="set-integrations-card" style="margin-bottom:24px;">
  <div class="card-header">
    <div>
      <div class="card-title">Integrasi</div>
      <div class="card-subtitle">Kelola fitur premium yang terhubung</div>
    </div>
  </div>
  <div id="set-toggles-container"></div>
</div>
