<div class="page-header flex-between">
  <div>
    <h1 class="page-title">Dashboard Inventaris</h1>
    <p class="page-desc">Monitoring stok barang secara real-time</p>
  </div>
  <button class="btn btn-primary" onclick="bukaModalProduk()"><span id="btn-plus-icon"></span>Tambah Produk</button>
</div>

<!-- stat cards -->
<div class="stats-row" id="inv-stats-row"></div>

<!-- chart + peringatan -->
<div class="layout-2-1">
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Level Stok per Produk</div>
        <div class="card-subtitle" id="inv-chart-subtitle">Merah = di bawah reorder point</div>
      </div>
    </div>
    <div class="chart-container" style="overflow-x: auto">
      <div id="chart-stok-sizer" class="chart-canvas">
        <canvas id="chart-stok"></canvas>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">Peringatan Stok Rendah</div>
        <div class="card-subtitle" id="inv-warning-subtitle"></div>
      </div>
    </div>
    <div class="alert-list" id="inv-alert-list"></div>
  </div>
</div>

<!-- tabel katalog -->
<div class="card">
  <div class="card-header">
    <div>
      <div class="card-title">Katalog Produk</div>
      <div class="card-subtitle" id="inv-katalog-subtitle"></div>
    </div>
    <!-- Filter bar -->
    <div class="form-group">
      <input class="form-input" type="text" id="cari-produk" placeholder="Cari nama/SKU..." />
      <select class="form-select" id="filter-inv-kategori" onchange="renderInventarisTable()">
        <option value="">Semua Kategori</option>
      </select>
      <select class="form-select" id="filter-inv-status" onchange="renderInventarisTable()">
        <option value="">Semua Status</option>
        <option value="aman">Aman</option>
        <option value="rendah">Stok Rendah</option>
      </select>
      <button class="btn btn-secondary" onclick="resetFilterInventaris()">Reset</button>
    </div>
  </div>
  <div style="overflow-x: auto">
    <!-- bar aksi bulk: muncul kalau ada produk yg dicentang -->
    <div class="inv-bulk-bar" id="inv-bulk-bar">
      <span id="inv-bulk-count" class="inv-bulk-count"></span>
      <button class="btn btn-danger btn-xs" onclick="konfirmasiHapusMassal()">Hapus Terpilih</button>
    </div>
    <table class="tabel" id="tabel-produk">
      <thead>
        <tr>
          <th class="text-center" style="width: 36px">
            <input type="checkbox" id="inv-check-all" onclick="toggleSelectAllProduk(this)" title="Pilih semua" />
          </th>
          <th class="text-center" style="width: 54px">QR</th>
          <th>SKU</th>
          <th>Nama Produk</th>
          <th>Kategori</th>
          <th class="text-right">Stok</th>
          <th class="text-right">Min</th>
          <th class="text-right">Harga Beli</th>
          <th class="text-right">Harga Jual</th>
          <th>Status</th>
          <th class="text-center" style="width: 100px">Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <!-- Pagination -->
  <div id="inv-pagination-placeholder" class="pagination-placeholder"></div>
</div>
