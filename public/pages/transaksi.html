<div class="page-header flex-between">
  <div>
    <h1 class="page-title">Riwayat Transaksi</h1>
    <p class="page-desc">Pencatatan barang masuk dan keluar</p>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-primary" onclick="bukaModalTx()"><span id="tx-plus-icon"></span> Transaksi Baru</button>
    <button class="btn btn-secondary" onclick="bukaUploadModal()"><span id="tx-upload-icon"></span> Upload CSV</button>
  </div>
</div>

<div class="summary-row">
  <div class="summary-card pengeluaran">
    <div class="summary-label"><span id="tx-arrow-down-icon"></span> Barang Masuk (Pengeluaran)</div>
    <div class="summary-value" id="tx-total-masuk">Rp0</div>
  </div>
  <div class="summary-card pemasukan">
    <div class="summary-label"><span id="tx-arrow-up-icon"></span> Barang Keluar (Pemasukan)</div>
    <div class="summary-value" id="tx-total-keluar">Rp0</div>
  </div>
  <div class="summary-card bersih-netral" id="tx-card-bersih">
    <div class="summary-label"><span id="tx-arrow-lfr-icon"></span> Bersih (Arus Kas)</div>
    <div class="summary-value" id="tx-total-bersih">Rp0</div>
  </div>
</div>

<div class="card">
  <div class="card-header flex-between" style="flex-wrap:wrap; gap:12px;">
    <div>
      <div class="card-title">Daftar Transaksi</div>
      <div class="card-subtitle" id="tx-list-subtitle">0 transaksi</div>
    </div>
    <!-- Filter bar -->
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
      <input class="form-input" type="text" id="cari-transaksi" placeholder="Cari transaksi..." style="max-width:160px; font-size:12px;">
      <select class="form-select" id="filter-tx-tipe" style="max-width:130px; font-size:12px;" onchange="filterTransaksiUpdate()">
        <option value="">Semua Tipe</option>
        <option value="MASUK">Masuk</option>
        <option value="KELUAR">Keluar</option>
      </select>
      <select class="form-select" id="filter-tx-metode" style="max-width:130px; font-size:12px;" onchange="filterTransaksiUpdate()">
        <option value="">Semua Metode</option>
        <option value="cash">Cash</option>
        <option value="transfer">Transfer</option>
        <option value="qris">QRIS</option>
      </select>
      <div style="display:flex; align-items:center; gap:4px;">
        <div id="drp-transaksi" style="min-width:220px;"></div>
        <button class="btn btn-secondary" style="padding:6px 10px; font-size:12px;" onclick="resetFilterTransaksi()">Reset</button>
      </div>
    </div>
  </div>
  <div style="overflow-x:auto;">
    <table class="tabel">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Tipe</th>
          <th>Produk</th>
          <th class="text-right">Jumlah</th>
          <th class="text-right">Harga Satuan</th>
          <th class="text-right">Total</th>
          <th>Metode</th>
          <th class="text-center" style="width:130px;">Aksi</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <!-- Pagination -->
  <div id="tx-pagination-placeholder" style="padding:12px 20px; border-top:1px solid var(--slate-100);"></div>
</div>

<div class="modal-overlay hidden" id="modal-tx">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <div class="modal-title">Transaksi Baru</div>
        <div class="modal-desc">Catat barang masuk atau keluar</div>
      </div>
      <button onclick="tutupModalTx()" style="padding:4px;" id="btn-tx-close"></button>
    </div>
    <form id="form-tx" style="margin-top:16px; display:flex; flex-direction:column; gap:12px;" onsubmit="submitTx(event)">
      <div>
        <label class="form-label">Tipe</label>
        <select class="form-select" id="tx-tipe">
          <option value="MASUK">Barang Masuk</option>
          <option value="KELUAR">Barang Keluar</option>
        </select>
      </div>
      <div>
        <label class="form-label">Produk</label>
        <select class="form-select" id="tx-produk"></select>
      </div>
      <div>
        <label class="form-label">Jumlah</label>
        <input class="form-input" type="number" id="tx-jumlah" min="1" value="1" required>
      </div>
      <div>
        <label class="form-label">Metode Pembayaran</label>
        <select class="form-select" id="tx-metode">
          <option value="cash">Tunai (Cash)</option>
          <option value="transfer">Transfer Bank</option>
          <option value="qris">QRIS</option>
        </select>
      </div>
      <div>
        <label class="form-label">Catatan (opsional)</label>
        <input class="form-input" type="text" id="tx-catatan" placeholder="Catatan...">
      </div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button type="button" class="btn btn-secondary" onclick="tutupModalTx()" style="flex:1;">Batal</button>
        <button type="submit" class="btn btn-primary" style="flex:1;">Simpan</button>
      </div>
    </form>
  </div>
</div>
