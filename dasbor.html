<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Ledgerly</title>
    <meta name="description" content="Dashboard Ledgerly — kelola inventaris dan keuangan toko kamu." />
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />

    <!-- PWA: manifest + theme color biar bisa di-install & ada warna app -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ledgerly" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dasbor.css" />
    <link rel="stylesheet" href="css/daterangepicker.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <script>(function(){try{if(localStorage.getItem('ledgerly_theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
  </head>
  <body>
    <div class="dasbor-shell">
      <!-- sidebar (di-render oleh sidebar.js) -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- area utama -->
      <div class="main-content">
        <!-- topbar (di-render oleh topbar.js) -->
        <header class="topbar" id="topbar"></header>

        <!-- konten halaman yg di-swap sesuai route -->
        <div class="page-content">
          <div class="page-inner" id="konten-utama">
            <!-- isinya di-render oleh router di app.js -->
          </div>
        </div>
      </div>
    </div>

    <!-- mobile nav overlay -->
    <div class="mobile-nav-overlay" id="mobile-nav">
      <div class="mobile-nav-backdrop" onclick="tutupMobileNav()"></div>
      <div class="mobile-nav-panel" id="mobile-nav-panel">
        <!-- isi mobile nav di-render oleh topbar.js -->
      </div>
    </div>

    <!-- chatbot panel (hidden by default) -->
    <div class="chatbot-panel hidden" id="chatbot-panel">
      <!-- di-render oleh chatbot.js -->
    </div>

    <!-- Chatbot Floating Action Button (Bouncing FAB) -->
    <!-- mulai 'hidden' biar gak kedip: JS (checkChatbotVisibility) yg munculin
         buat pemilik toko & nyembunyiin buat superadmin. dulu default visible
         -> superadmin liat FAB nongol sekejap sblm JS sempet sembunyiin. -->
    <div class="chatbot-fab-container hidden" id="chatbot-fab-container">
      <div class="chatbot-fab-tip" id="chatbot-fab-tip">Tanya AI Ledgerly...</div>
      <button type="button" class="chatbot-fab-btn" onclick="toggleChatbot()" title="Tanya AI Ledgerly">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"
          />
        </svg>
        <span class="chatbot-fab-dot"></span>
      </button>
    </div>

    <!-- upload modal (hidden by default) -->
    <div class="modal-overlay hidden" id="upload-modal">
      <!-- di-render oleh upload.js -->
    </div>

    <!-- CDN libraries (import functions dari library CDN supabase.js, chart.js, jspdf[Export PDF], PapaParse[Import/Export CSV], XLSX[Import/Export Excel]) -->
    <!-- semua library SELF-HOSTED (same-origin) — dulu dr CDN jsdelivr/cdnjs
         tp sering kena 503 (rate-limit) -> chart/export/scan/import mati.
         di-host lokal di public/js/vendor biar gak gantung CDN pihak ketiga. -->
    <script src="js/vendor/supabase.js?v=9"></script>
    <script src="js/vendor/chart.js?v=9"></script>
    <script src="js/vendor/jspdf.js?v=9"></script>
    <script src="js/vendor/jspdf-autotable.js?v=9"></script>
    <script src="js/vendor/papaparse.js?v=9"></script>
    <script src="js/vendor/xlsx.js?v=9"></script>
    <script src="js/vendor/html5-qrcode.js?v=9"></script>
    <script src="js/vendor/exceljs.js?v=9"></script>
    <script src="js/vendor/qrious.js?v=9"></script>

    <!-- app modules (urutan penting, karena depedensi antar modul) -->
    <script src="js/supabase.js?v=9"></script>
    <script src="js/data.js?v=9"></script>
    <script src="js/utils.js?v=9"></script>
    <script src="js/export.js?v=9"></script>
    <script src="js/komponen/sidebar.js?v=9"></script>
    <script src="js/komponen/topbar.js?v=9"></script>
    <script src="js/komponen/chatbot.js?v=9"></script>
    <script src="js/komponen/upload.js?v=9"></script>
    <script src="js/komponen/daterangepicker.js?v=9"></script>
    <script src="js/pages/inventaris.js?v=9"></script>
    <script src="js/pages/keuangan.js?v=9"></script>
    <script src="js/pages/transaksi.js?v=9"></script>
    <script src="js/pages/laporan.js?v=9"></script>
    <script src="js/pages/keputusan.js?v=9"></script>
    <script src="js/pages/pengaturan.js?v=9"></script>
    <script src="js/pages/pengumuman.js?v=9"></script>
    <script src="js/pages/kelola-pemilik.js?v=9"></script>
    <script src="js/pages/dasbor-superadmin.js?v=9"></script>
    <script src="js/pages/pengaturan-platform.js?v=9"></script>
    <script src="js/pages/kelola-pengumuman.js?v=9"></script>
    
    <!-- posisi terakhir, karena pakai function dari modul lain -->
    <script src="js/app.js?v=9"></script>
    <script src="js/theme.js?v=9"></script>

    <!-- daftarkan service worker buat PWA (offline baca + bisa di-install) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js').then(function(reg) {
            console.log('Service worker terdaftar:', reg.scope);
          }).catch(function(err) {
            console.warn('Service worker gagal daftar:', err);
          });
        });
      }
    </script>
  </body>
</html>
